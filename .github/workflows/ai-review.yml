name: AI Review (prototype)

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Print diff (for debug)
        run: cat diff.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send diff to AI (prototype)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ ! -s diff.txt ]; then
            echo "No diff found, skipping AI review."
            exit 0
          fi

          DIFF=$(head -c 6000 diff.txt | jq -Rs .)

          curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"Project context:\n- Monorepo with frontend + API\n- Frontend only talks to API (no DB access)\n- Backend owns data and identity\n- Focus on maintainability and correctness\n\nReview rules:\n- Look for bugs and crash risks\n- Check API contract assumptions\n- Identify missing validation\n- Point out inconsistent patterns\n- Prioritize correctness over style\n- Suggest improvements only when they provide real value\n- Do not comment on minor styling unless it affects functionality\n- Ignore workflow and configuration files unless they affect runtime behavior\n\nOnly comment on actual issues. If no issues are found, say so clearly.\n\nFormat your response in clean Markdown:\n- Use headings (##)\n- Use bullet points\n- Be concise and structured\"
                },
                {
                  \"role\": \"user\",
                  \"content\": $DIFF
                }
              ]
            }" > response.json

      - name: Post AI review as PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          REVIEW=$(jq -r '.choices[0].message.content' response.json)
          if [[ "$REVIEW" == *"No issues found"* ]]; then
            echo "No issues found, skipping PR comment."
            exit 0
          fi

          FORMATTED=$'## 🤖 AI Review\n\n'"$REVIEW"
          BODY=$(jq -n --arg text "$FORMATTED" '{ body: $text }')

          curl -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "$BODY"
