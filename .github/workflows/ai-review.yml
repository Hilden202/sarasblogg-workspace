name: AI Review (prototype)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

          if git merge-base --is-ancestor origin/${{ github.base_ref }} HEAD 2>/dev/null || git merge-base HEAD origin/${{ github.base_ref }} >/dev/null 2>&1; then
            git diff origin/${{ github.base_ref }}...HEAD \
              -- . \
              ':(exclude)*.md' \
              ':(exclude)*.yml' > diff.txt
          else
            echo "No merge base found, falling back to two-dot diff."
            git diff origin/${{ github.base_ref }} HEAD \
              -- . \
              ':(exclude)*.md' \
              ':(exclude)*.yml' > diff.txt
          fi

      - name: Print diff (for debug)
        run: cat diff.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send diff to AI (prototype)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          if [ ! -s diff.txt ]; then
            echo "No diff found, creating empty AI response."
            echo '{"choices":[{"message":{"content":"NO_ISSUES"}}]}' > response.json
            exit 0
          fi

          DIFF=$(head -n 300 diff.txt | jq -Rs .)
          FILE_CONTENT=$(head -n 300 .github/workflows/ai-review.yml | jq -Rs .)

          BODY=$(jq -n \
            --arg diff "$DIFF" \
            --arg file "$FILE_CONTENT" \
            --arg model "$OPENAI_MODEL" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "Project context:\n- Monorepo with frontend + API\n- Frontend only talks to API (no DB access)\n- Backend owns data and identity\n- Focus on maintainability and correctness\n\nReview rules:\n- Look for bugs and crash risks\n- Check API contract assumptions\n- Identify missing validation\n- Point out inconsistent patterns\n- Prioritize correctness over style\n- Suggest improvements only when they provide real value\n- Do not comment on minor styling unless it affects functionality\n- Ignore workflow and configuration files unless they affect runtime behavior\n\nYou will receive:\n- DIFF: what changed\n- FULL FILE: the current file after changes\n\nUse BOTH to reason about correctness.\n\nWhen referring to a finding:\n- Always start with a short, clear explanation in plain text.\n- ALWAYS include file and line number when possible using format: Fil: <path>, rad: <number>\n- Only include a code diff if it adds real value for understanding the issue.\n- Avoid including diffs for simple or obvious changes.\n- If exact line number is uncertain, include file only and do not guess.\n\nIf you include code, use this format:\nFil: <path>, rad: <number>\nÄndring:\n```diff\n- old line\n+ new line\n```\n\nOnly include changed lines that actually appear in the diff.\nDo not guess old or new code if it is not clearly present in the diff.\n\nOnly comment on actual issues. If no issues are found, say so clearly.\n\nFormat your response in clean Markdown:\n- Use headings (##)\n- Use bullet points\n- Be concise and structured\n\nGroup findings into:\n- 🔥 Critical (must fix before merge)\n- ⚠️ Warnings (should be reviewed)\n- 💡 Suggestions (nice improvements)\n\nSeverity rules:\n- 🔥 Critical:\n  - Crashes or unhandled exceptions\n  - Security issues\n  - Data loss or corruption risk\n  - Breaking API contracts\n\n- ⚠️ Warnings:\n  - Risky changes that may cause issues\n  - Behavior changes (e.g. return -> exception)\n  - Missing handling in callers\n  - Potential edge cases\n\n- 💡 Suggestions:\n  - Improvements, refactoring, logging, readability\n\nIMPORTANT:\n- Only classify something as Critical if it is very likely to break production or cause crashes.\n- If uncertain, classify as Warning instead of Critical.\n- Do NOT include the Critical section unless there is at least one real critical issue.\n\nYou will receive:\n- DIFF: what changed\n- FULL FILE: the current file after changes\n\nUse BOTH to reason about correctness.\n\nWhen referring to a finding:\n- Always start with a short, clear explanation in plain text.\n- Only include a code diff if it adds real value for understanding the issue.\n- Avoid including diffs for simple or obvious changes.\n\nIf you include code, use this format:\nFil: <path>, rad: <number>\nÄndring:\n```diff\n- old line\n+ new line\n```\n\nOnly include changed lines that actually appear in the diff.\nDo not guess old or new code if it is not clearly present in the diff.\n\nOnly comment on actual issues. If no issues are found, say so clearly.\n\nFormat your response in clean Markdown:\n- Use headings (##)\n- Use bullet points\n- Be concise and structured\n\nGroup findings into:\n- 🔥 Critical (must fix before merge)\n- ⚠️ Warnings (should be reviewed)\n- 💡 Suggestions (nice improvements)\n\nOnly include sections that contain real issues.\nIf a section has no findings, DO NOT include that section at all.\nDo not output empty sections or placeholder text like \"None.\", \"Inga problem hittades\", \"Inga kritiska problem hittades\" or \"Inga kritiska problem upptäcktes\" inside sections.\n\nAdditional rules:\n- Keep the review concise and to the point (prefer short bullet points).\n- Avoid long explanations unless absolutely necessary.\n- Prefer concise explanations over code blocks.\n- Write the entire review in Swedish.\nIf there are absolutely no issues (no critical, no warnings, no suggestions), respond with EXACTLY this single token and nothing else:\nNO_ISSUES\nIf ANY warning or suggestion exists, DO NOT include the token NO_ISSUES anywhere in the response."
                },
                {
                  role: "user",
                  content: ("DIFF:\n" + $diff + "\n\nFULL FILE:\n" + $file)
                }
              ]
            }')

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "OpenAI request failed with status $HTTP_STATUS"
            cat response.json
            exit 1
          fi

      - name: Post AI review as PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |

          REVIEW=$(jq -r '.choices[0].message.content' response.json)

          # Remove accidental NO_ISSUES token if the model included other content as well
          if [[ "$REVIEW" == *"NO_ISSUES"* ]] && [[ "$REVIEW" != "NO_ISSUES" ]]; then
            REVIEW=$(echo "$REVIEW" | sed '/^NO_ISSUES$/d' | sed 's/NO_ISSUES//g')
          fi

          REVIEW=$(echo "$REVIEW" | sed '/🔥 Kritiska/,+3{/Ingen kritisk problem hittades/d}')
          REVIEW=$(echo "$REVIEW" | sed '/🔥 Kritiska/,+3{/Inga kritiska problem hittades/d}')
          REVIEW=$(echo "$REVIEW" | sed '/🔥 Kritiska/,+3{/Inga kritiska problem upptäcktes/d}')
          REVIEW=$(echo "$REVIEW" | sed '/⚠️ Varningar/,+3{/Inga varningar hittades/d}')
          REVIEW=$(echo "$REVIEW" | sed '/💡 Förslag/,+3{/Inga förbättringar föreslogs/d}')

          # Remove empty section headers left behind after cleanup
          REVIEW=$(echo "$REVIEW" | sed '/🔥 Kritiska$/N;/\n[[:space:]]*$/d')
          REVIEW=$(echo "$REVIEW" | sed '/⚠️ Varningar$/N;/\n[[:space:]]*$/d')
          REVIEW=$(echo "$REVIEW" | sed '/💡 Förslag$/N;/\n[[:space:]]*$/d')

          if [[ "$REVIEW" == "NO_ISSUES" ]] || [[ -z "$REVIEW" ]]; then
            echo "No issues found, updating comment with clean state."
            FORMATTED=$'## 🤖 AI Review\n\n<!-- ai-review -->\n\n✅ Inga problem hittades i senaste ändringarna.'
          else
            FORMATTED=$'## 🤖 AI Review\n\n<!-- ai-review -->\n\n'"$REVIEW"
          fi

          COMMENTS=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments)

          COMMENT_ID=$(echo "$COMMENTS" | jq -r '.[] | select(.body | contains("<!-- ai-review -->")) | .id' | head -n 1)

          if [ "$COMMENT_ID" != "" ] && [ "$COMMENT_ID" != "null" ]; then
            echo "Updating existing AI review comment..."

            BODY=$(jq -n --arg text "$FORMATTED" '{ body: $text }')

            curl -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -d "$BODY"
          else
            echo "Creating new AI review comment..."

            BODY=$(jq -n --arg text "$FORMATTED" '{ body: $text }')

            curl -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -d "$BODY"
          fi
