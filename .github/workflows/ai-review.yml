name: AI Review (prototype)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD \
            -- . \
            ':(exclude)*.md' \
            ':(exclude)*.yml' > diff.txt

      - name: Print diff (for debug)
        run: cat diff.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send diff to AI (prototype)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          if [ ! -s diff.txt ]; then
            echo "No diff found, skipping AI review."
            exit 0
          fi

          DIFF=$(head -n 300 diff.txt | jq -Rs .)
          FILE_CONTENT=$(head -n 300 .github/workflows/ai-review.yml | jq -Rs .)

          BODY=$(jq -n \
            --arg diff "$DIFF" \
            --arg file "$FILE_CONTENT" \
            --arg model "$OPENAI_MODEL" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "Project context:\n- Monorepo with frontend + API\n- Frontend only talks to API (no DB access)\n- Backend owns data and identity\n- Focus on maintainability and correctness\n\nReview rules:\n- Look for bugs and crash risks\n- Check API contract assumptions\n- Identify missing validation\n- Point out inconsistent patterns\n- Prioritize correctness over style\n- Suggest improvements only when they provide real value\n- Do not comment on minor styling unless it affects functionality\n- Ignore workflow and configuration files unless they affect runtime behavior\n\nYou will receive:\n- DIFF: what changed\n- FULL FILE: the current file after changes\n\nUse BOTH to reason about correctness.\n\nOnly comment on actual issues. If no issues are found, say so clearly.\n\nFormat your response in clean Markdown:\n- Use headings (##)\n- Use bullet points\n- Be concise and structured\n\nGroup findings into:\n- 🔥 Critical (must fix before merge)\n- ⚠️ Warnings (should be reviewed)\n- 💡 Suggestions (nice improvements)\n\nOnly include sections that contain real issues.\nIf a section has no findings, DO NOT include that section at all.\nDo not output empty sections or placeholder text like \"None.\" or \"Inga problem hittades\" inside sections.\n\nAdditional rules:\n- Keep the review concise and to the point (prefer short bullet points).\n- Avoid long explanations unless absolutely necessary.\n- Write the entire review in Swedish.\nIf there are absolutely no issues (no critical, no warnings, no suggestions), respond ONLY with:\nNO_ISSUES\nIf ANY warning or suggestion exists, DO NOT return NO_ISSUES."
                },
                {
                  role: "user",
                  content: ("DIFF:\n" + $diff + "\n\nFULL FILE:\n" + $file)
                }
              ]
            }')

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "OpenAI request failed with status $HTTP_STATUS"
            cat response.json
            exit 1
          fi

      - name: Post AI review as PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |

          REVIEW=$(jq -r '.choices[0].message.content' response.json)

          # Remove empty sections generated by AI
          REVIEW=$(echo "$REVIEW" | sed '/🔥 Kritiska/,+2{/Ingen kritisk problem hittades/d}')
          REVIEW=$(echo "$REVIEW" | sed '/⚠️ Varningar/,+2{/Inga/d}')

          if [[ "$REVIEW" == "NO_ISSUES" ]] || [[ -z "$REVIEW" ]]; then
            echo "No issues found, updating comment with clean state."
            FORMATTED=$'## 🤖 AI Review\n\n<!-- ai-review -->\n\n✅ Inga problem hittades i senaste ändringarna.'
          else
            FORMATTED=$'## 🤖 AI Review\n\n<!-- ai-review -->\n\n'"$REVIEW"
          fi

          COMMENTS=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments)

          COMMENT_ID=$(echo "$COMMENTS" | jq -r '.[] | select(.body | contains("<!-- ai-review -->")) | .id' | head -n 1)

          if [ "$COMMENT_ID" != "" ] && [ "$COMMENT_ID" != "null" ]; then
            echo "Updating existing AI review comment..."

            BODY=$(jq -n --arg text "$FORMATTED" '{ body: $text }')

            curl -X PATCH \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -d "$BODY"
          else
            echo "Creating new AI review comment..."

            BODY=$(jq -n --arg text "$FORMATTED" '{ body: $text }')

            curl -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -d "$BODY"
          fi
