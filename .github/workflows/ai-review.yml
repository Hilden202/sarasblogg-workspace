name: AI Review (prototype)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Print diff (for debug)
        run: cat diff.txt

      - name: Send diff to AI (prototype)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF=$(head -c 6000 diff.txt | jq -Rs .)
      
          curl https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"Project context:\n- Monorepo with frontend + API\n- Frontend only talks to API (no DB access)\n- Backend owns data and identity\n- Focus on maintainability and correctness\n\nReview rules:\n- Look for bugs and crash risks\n- Check API contract assumptions\n- Identify missing validation\n- Point out inconsistent patterns\n- Avoid generic advice\n\nOnly comment on actual issues.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": $DIFF
                }
              ]
            }"
